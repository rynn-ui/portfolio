<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rudraksh Pandey — Portfolio</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --accent: #e05a4b; }
    html { scroll-behavior: auto; }

    /* Hide scrollbar but keep scroll functionality */
    ::-webkit-scrollbar { display: none; }
    html { -ms-overflow-style: none; scrollbar-width: none; }

    /* Hide default cursor everywhere */
    *, a, button { cursor: none !important; }

    body {
      background: #c8c8c8;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    /* ══════════════════════════════════════
       CUSTOM CURSOR
    ══════════════════════════════════════ */
    #cursor-dot {
      position: fixed; top: 0; left: 0;
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent);
      pointer-events: none; z-index: 99999;
      transform: translate(-50%, -50%);
      transition: transform 0.08s ease, width 0.2s ease, height 0.2s ease, opacity 0.2s;
      mix-blend-mode: multiply;
    }
    #cursor-ring {
      position: fixed; top: 0; left: 0;
      width: 36px; height: 36px; border-radius: 50%;
      border: 1.5px solid rgba(224,90,75,0.55);
      pointer-events: none; z-index: 99998;
      transform: translate(-50%, -50%);
      transition: transform 0.18s ease, width 0.25s ease, height 0.25s ease, opacity 0.2s;
    }
    /* Trail dots — injected by JS */
    .cursor-trail {
      position: fixed; border-radius: 50%;
      background: var(--accent);
      pointer-events: none; z-index: 99997;
      transform: translate(-50%, -50%);
      transition: opacity 0.4s ease;
    }

    /* ══════════════════════════════════════
       SOUND UNLOCK
    ══════════════════════════════════════ */
    #sound-unlock {
      position: fixed; inset: 0; z-index: 10000;
      display: flex; align-items: center; justify-content: center;
      background: #0a0a0a;
      transition: opacity 0.5s ease;
    }
    #sound-unlock.hidden { opacity: 0; pointer-events: none; }
    .unlock-inner { text-align: center; animation: pulse 2s ease-in-out infinite; }
    .unlock-circle {
      width: 90px; height: 90px; border-radius: 50%;
      border: 1.5px solid rgba(224,90,75,0.6);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.6rem; position: relative;
    }
    .unlock-circle::before {
      content: ''; position: absolute; inset: -10px; border-radius: 50%;
      border: 1px solid rgba(224,90,75,0.2);
      animation: ripple 2s ease-out infinite;
    }
    .unlock-icon { font-size: 2rem; }
    .unlock-text {
      color: rgba(255,255,255,0.85); font-size: 0.7rem;
      letter-spacing: 0.3em; text-transform: uppercase;
    }
    .unlock-sub {
      color: rgba(255,255,255,0.3); font-size: 0.6rem;
      letter-spacing: 0.2em; text-transform: uppercase; margin-top: 0.5rem;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); } 50% { transform: scale(1.03); }
    }
    @keyframes ripple {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    /* ══════════════════════════════════════
       LOADER — letter by letter
    ══════════════════════════════════════ */
    #loader {
      position: fixed; inset: 0; background: #111;
      z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.7s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }

    .loader-letters {
      display: flex; gap: 0.04em;
      margin-bottom: 2.8rem; overflow: hidden;
    }
    .loader-letter {
      color: #fff;
      font-size: clamp(1.1rem, 2.8vw, 1.6rem);
      letter-spacing: 0.08em; text-transform: uppercase;
      font-weight: 300;
      display: inline-block;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .loader-letter.space { width: 0.5em; }
    .loader-letter.visible { opacity: 1; transform: translateY(0); }

    .loader-bar-wrap {
      width: min(380px, 80vw); height: 1px;
      background: #2a2a2a; border-radius: 1px; overflow: hidden;
    }
    .loader-bar-fill {
      height: 100%; width: 0%;
      background: var(--accent);
      transition: width 0.1s linear;
    }
    .loader-count {
      color: #444; font-size: 0.7rem;
      letter-spacing: 0.25em; margin-top: 1.4rem;
      font-variant-numeric: tabular-nums;
    }
    .loader-pct {
      color: var(--accent); font-size: 0.6rem;
      letter-spacing: 0.3em; margin-top: 0.4rem;
      opacity: 0.7;
    }

    /* ══════════════════════════════════════
       SCROLL CONTAINER + CANVAS
    ══════════════════════════════════════ */
    #scroll-container { height: 600vh; }
    #canvas-wrap {
      position: sticky; top: 0;
      width: 100%; height: 100vh; overflow: hidden;
    }
    #anim-canvas { display: block; width: 100%; height: 100%; }

    /* ══════════════════════════════════════
       GRAIN + VIGNETTE overlay
    ══════════════════════════════════════ */
    #overlay-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 10;
      width: 100%; height: 100%;
    }

    /* ══════════════════════════════════════
       PARTICLE CANVAS (SFX sparks)
    ══════════════════════════════════════ */
    #particle-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 20;
      width: 100%; height: 100%;
    }

    /* ══════════════════════════════════════
       SCROLL HINT
    ══════════════════════════════════════ */
    #scroll-hint {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column;
      align-items: center; gap: 0.5rem;
      opacity: 1; transition: opacity 0.5s;
      pointer-events: none; z-index: 100;
    }
    #scroll-hint.gone { opacity: 0; }
    .hint-text {
      color: rgba(255,255,255,0.7); font-size: 0.65rem;
      letter-spacing: 0.25em; text-transform: uppercase;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .hint-arrow {
      width: 1px; height: 36px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.7));
      animation: bounce 1.4s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100% { transform: scaleY(1) translateY(0); opacity: 1; }
      50% { transform: scaleY(1.15) translateY(4px); opacity: 0.5; }
    }

    /* ══════════════════════════════════════
       PROGRESS BAR
    ══════════════════════════════════════ */
    #progress {
      position: fixed; top: 0; left: 0;
      height: 2px; width: 0%;
      background: var(--accent); z-index: 200;
      transition: width 0.05s linear;
      box-shadow: 0 0 8px var(--accent);
    }

    /* ══════════════════════════════════════
       GLASSMORPHISM NAVBAR
    ══════════════════════════════════════ */
    #navbar {
      position: fixed; top: 12px; left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px); max-width: 1400px;
      z-index: 150;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 52px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10), inset 0 1px 0 rgba(255,255,255,0.30);
      opacity: 0; transition: opacity 0.6s ease;
    }
    #navbar.visible { opacity: 1; }
    .nav-left, .nav-center, .nav-right {
      font-size: 0.7rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: #111;
      font-weight: 500;
      text-shadow: 0 1px 2px rgba(255,255,255,0.5);
      white-space: nowrap; user-select: none;
    }
    .nav-center {
      position: absolute; left: 50%; transform: translateX(-50%);
      color: #555; font-weight: 400; letter-spacing: 0.28em;
    }
    .nav-right { color: #888; font-weight: 400; }

    /* ══════════════════════════════════════
       SECTION NAV DOTS  (right side)
    ══════════════════════════════════════ */
    #section-nav {
      position: fixed; right: 24px; top: 50%;
      transform: translateY(-50%);
      z-index: 160;
      display: flex; flex-direction: column; gap: 14px;
      opacity: 0; transition: opacity 0.5s;
    }
    #section-nav.visible { opacity: 1; }

    .snav-dot {
      position: relative;
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.35);
      border: 1px solid rgba(255,255,255,0.5);
      transition: background 0.3s, transform 0.3s, border-color 0.3s;
      display: flex; align-items: center;
    }
    .snav-dot:hover { transform: scale(1.4); background: rgba(255,255,255,0.7); }
    .snav-dot.active {
      background: var(--accent);
      border-color: var(--accent);
      transform: scale(1.3);
      box-shadow: 0 0 8px var(--accent);
    }

    /* Tooltip label on hover */
    .snav-dot::before {
      content: attr(data-label);
      position: absolute; right: 18px;
      background: rgba(0,0,0,0.7);
      color: #fff; font-size: 0.55rem; letter-spacing: 0.15em;
      text-transform: uppercase; white-space: nowrap;
      padding: 3px 8px; border-radius: 4px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .snav-dot:hover::before { opacity: 1; }

    /* ══════════════════════════════════════
       SECTION LABEL (centre bottom)
    ══════════════════════════════════════ */
    #section-label {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: rgba(255,255,255,0.5);
      text-shadow: 0 1px 6px rgba(0,0,0,0.3);
      pointer-events: none; z-index: 100;
      opacity: 0; transition: opacity 0.4s;
    }
    #section-label.visible { opacity: 1; }

    /* ══════════════════════════════════════
       SOUND / SFX UI
    ══════════════════════════════════════ */
    #sound-btn {
      position: fixed; bottom: 2rem; right: 2rem;
      z-index: 160;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      opacity: 0; transition: opacity 0.4s, transform 0.2s;
      color: #333;
    }
    #sound-btn.visible { opacity: 1; }
    #sound-btn:hover { transform: scale(1.1); }

    #sfx-label {
      position: fixed; bottom: 5.5rem; right: 2rem;
      z-index: 160; font-size: 0.55rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--accent);
      opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    #sfx-label.show { opacity: 1; }
  </style>
</head>
<body>

<!-- Custom cursor -->
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<!-- Sound unlock -->
<div id="sound-unlock">
  <div class="unlock-inner">
    <div class="unlock-circle"><span class="unlock-icon">🔊</span></div>
    <div class="unlock-text">Click to enter with sound</div>
    <div class="unlock-sub">Rudraksh Pandey · Portfolio 2026</div>
  </div>
</div>

<!-- Loader -->
<div id="loader">
  <div class="loader-letters" id="loader-letters"></div>
  <div class="loader-bar-wrap">
    <div class="loader-bar-fill" id="loader-fill"></div>
  </div>
  <div class="loader-count" id="loader-count">0 / 600</div>
  <div class="loader-pct" id="loader-pct">0%</div>
</div>

<!-- Progress bar -->
<div id="progress"></div>

<!-- Navbar -->
<nav id="navbar">
  <span class="nav-left">Rudraksh Pandey</span>
  <span class="nav-center">Scroll</span>
  <span class="nav-right" id="nav-year"></span>
</nav>

<!-- Section nav dots -->
<nav id="section-nav">
  <div class="snav-dot" data-label="Intro"         data-frame="80"></div>
  <div class="snav-dot" data-label="Portfolio"     data-frame="150"></div>
  <div class="snav-dot" data-label="About Me"      data-frame="300"></div>
  <div class="snav-dot" data-label="Skills"        data-frame="440"></div>
  <div class="snav-dot" data-label="Projects"      data-frame="510"></div>
  <div class="snav-dot" data-label="Qualifications" data-frame="560"></div>
  <div class="snav-dot" data-label="Thank You"     data-frame="590"></div>
</nav>

<!-- Section label -->
<div id="section-label"></div>

<!-- Main animation -->
<div id="scroll-container">
  <div id="canvas-wrap">
    <canvas id="anim-canvas"></canvas>
  </div>
</div>

<!-- Grain + vignette overlay canvas -->
<canvas id="overlay-canvas"></canvas>

<!-- Particle sparks canvas -->
<canvas id="particle-canvas"></canvas>

<!-- Scroll hint -->
<div id="scroll-hint">
  <span class="hint-text">Scroll</span>
  <div class="hint-arrow"></div>
</div>

<!-- Sound button -->
<button id="sound-btn" title="Toggle sound">🔊</button>
<div id="sfx-label"></div>

<script>
(() => {
  /* ══════════════════════════════════════
     AUTO YEAR
  ══════════════════════════════════════ */
  document.getElementById('nav-year').textContent = new Date().getFullYear();

  /* ══════════════════════════════════════
     CUSTOM CURSOR + TRAIL
  ══════════════════════════════════════ */
  const dot  = document.getElementById('cursor-dot');
  const ring = document.getElementById('cursor-ring');
  const TRAIL_COUNT = 8;
  const trails = [];

  // Build trail elements
  for (let i = 0; i < TRAIL_COUNT; i++) {
    const t = document.createElement('div');
    t.className = 'cursor-trail';
    const size = 8 - i * 0.7;
    t.style.cssText = `width:${size}px;height:${size}px;opacity:${0.35 - i*0.04}`;
    document.body.appendChild(t);
    trails.push({ el: t, x: 0, y: 0 });
  }

  let mouseX = 0, mouseY = 0;
  let ringX = 0, ringY = 0;
  const trailHistory = Array(TRAIL_COUNT).fill({ x: 0, y: 0 });

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    dot.style.left = mouseX + 'px';
    dot.style.top  = mouseY + 'px';
    // Push to history
    trailHistory.unshift({ x: mouseX, y: mouseY });
    trailHistory.length = TRAIL_COUNT;
  });

  // Ring lerp + trail positions on rAF
  function cursorTick() {
    ringX += (mouseX - ringX) * 0.12;
    ringY += (mouseY - ringY) * 0.12;
    ring.style.left = ringX + 'px';
    ring.style.top  = ringY + 'px';

    trails.forEach((t, i) => {
      const delay = i + 1;
      const hist  = trailHistory[Math.min(delay * 2, TRAIL_COUNT - 1)];
      t.x += (hist.x - t.x) * 0.18;
      t.y += (hist.y - t.y) * 0.18;
      t.el.style.left = t.x + 'px';
      t.el.style.top  = t.y + 'px';
    });
    requestAnimationFrame(cursorTick);
  }
  cursorTick();

  // Cursor scale on hover interactive elements
  document.addEventListener('mouseover', e => {
    if (e.target.closest('button, a, .snav-dot')) {
      dot.style.transform  = 'translate(-50%,-50%) scale(2.2)';
      ring.style.transform = 'translate(-50%,-50%) scale(1.5)';
    }
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest('button, a, .snav-dot')) {
      dot.style.transform  = 'translate(-50%,-50%) scale(1)';
      ring.style.transform = 'translate(-50%,-50%) scale(1)';
    }
  });

  /* ══════════════════════════════════════
     LETTER-BY-LETTER LOADER ANIMATION
  ══════════════════════════════════════ */
  const NAME = 'Rudraksh Pandey';
  const lettersWrap = document.getElementById('loader-letters');

  NAME.split('').forEach((ch, i) => {
    const span = document.createElement('span');
    span.className = 'loader-letter' + (ch === ' ' ? ' space' : '');
    span.textContent = ch === ' ' ? '\u00A0' : ch;
    lettersWrap.appendChild(span);
    // Stagger reveal
    setTimeout(() => span.classList.add('visible'), 80 + i * 55);
  });

  /* ══════════════════════════════════════
     GRAIN + VIGNETTE OVERLAY
  ══════════════════════════════════════ */
  const overlayCanvas = document.getElementById('overlay-canvas');
  const octx = overlayCanvas.getContext('2d');
  let grainFrame = 0;

  function resizeOverlay() {
    overlayCanvas.width  = window.innerWidth;
    overlayCanvas.height = window.innerHeight;
  }
  resizeOverlay();

  function drawOverlay() {
    const w = overlayCanvas.width, h = overlayCanvas.height;
    octx.clearRect(0, 0, w, h);

    // — Grain (animated, new pattern every frame)
    const imageData = octx.createImageData(w, h);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
      const v = (Math.random() * 255) | 0;
      data[i] = data[i+1] = data[i+2] = v;
      data[i+3] = 18; // very subtle
    }
    octx.putImageData(imageData, 0, 0);

    // — Corner vignette (4 radial gradients, one per corner, low intensity)
    const cornerRadius = Math.min(w, h) * 0.52;
    const cornerAlpha  = 0.28;
    const corners = [
      [0, 0], [w, 0], [0, h], [w, h]
    ];
    corners.forEach(([cx, cy]) => {
      const cg = octx.createRadialGradient(cx, cy, 0, cx, cy, cornerRadius);
      cg.addColorStop(0, `rgba(0,0,0,${cornerAlpha})`);
      cg.addColorStop(1, 'rgba(0,0,0,0)');
      octx.fillStyle = cg;
      octx.fillRect(0, 0, w, h);
    });

    grainFrame++;
    requestAnimationFrame(drawOverlay);
  }
  drawOverlay();

  /* ══════════════════════════════════════
     PARTICLE SPARKS
  ══════════════════════════════════════ */
  const pCanvas = document.getElementById('particle-canvas');
  const pctx    = pCanvas.getContext('2d');
  let particles = [];

  function resizeParticle() {
    pCanvas.width  = window.innerWidth;
    pCanvas.height = window.innerHeight;
  }
  resizeParticle();

  function spawnParticles(x, y, color, count = 40) {
    for (let i = 0; i < count; i++) {
      const angle  = Math.random() * Math.PI * 2;
      const speed  = 2 + Math.random() * 7;
      const size   = 2 + Math.random() * 4;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 2,
        life: 1, decay: 0.018 + Math.random() * 0.025,
        size, color,
        gravity: 0.12,
      });
    }
  }

  function particleTick() {
    pctx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x   += p.vx;
      p.y   += p.vy;
      p.vy  += p.gravity;
      p.vx  *= 0.97;
      p.life -= p.decay;
      pctx.globalAlpha = Math.max(0, p.life);
      pctx.fillStyle   = p.color;
      pctx.beginPath();
      pctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      pctx.fill();
    });
    pctx.globalAlpha = 1;
    requestAnimationFrame(particleTick);
  }
  particleTick();

  /* ══════════════════════════════════════
     SOUND ENGINE
  ══════════════════════════════════════ */
  let audioCtx = null;
  let muted = false;
  const buffers = {};

  const SFX_TRIGGERS = {
    crack:     { frame: 150, range: 8, file: 'crack',     label: '💥 CRACK',
                 color: '#ff9944', cx: 0.62, cy: 0.38 },
    explosion: { frame: 185, range: 8, file: 'explosion', label: '💣 BLAST',
                 color: '#e05a4b', cx: 0.5,  cy: 0.5  },
  };
  const firedSfx = new Set();

  async function loadSound(name, url) {
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('not found');
      buffers[name] = await audioCtx.decodeAudioData(await res.arrayBuffer());
    } catch(e) {
      console.warn(`⚠️ Could not load ${url}`);
    }
  }

  function playSound(name, volume = 1) {
    if (muted || !audioCtx || !buffers[name]) return;
    const src  = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();
    src.buffer    = buffers[name];
    gain.gain.value = volume;
    src.connect(gain); gain.connect(audioCtx.destination);
    src.start(0);
  }

  let whooshSrc = null, whooshGain = null, scrollTimer = null;

  function startWhoosh() {
    if (muted || !audioCtx || !buffers['scroll'] || whooshSrc) return;
    whooshSrc = audioCtx.createBufferSource();
    whooshGain = audioCtx.createGain();
    whooshSrc.buffer = buffers['scroll'];
    whooshSrc.loop   = true;
    whooshGain.gain.setValueAtTime(0, audioCtx.currentTime);
    whooshGain.gain.linearRampToValueAtTime(0.45, audioCtx.currentTime + 0.12);
    whooshSrc.connect(whooshGain);
    whooshGain.connect(audioCtx.destination);
    whooshSrc.start(0);
  }
  function stopWhoosh() {
    if (!whooshSrc || !whooshGain) return;
    const t = audioCtx.currentTime;
    whooshGain.gain.setValueAtTime(whooshGain.gain.value, t);
    whooshGain.gain.linearRampToValueAtTime(0, t + 0.25);
    whooshSrc.stop(t + 0.26);
    whooshSrc = null; whooshGain = null;
  }
  function onScrollSound() {
    startWhoosh();
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(stopWhoosh, 120);
  }

  const sfxLabel = document.getElementById('sfx-label');
  let labelTimer = null;
  function flashLabel(text) {
    sfxLabel.textContent = text;
    sfxLabel.classList.add('show');
    clearTimeout(labelTimer);
    labelTimer = setTimeout(() => sfxLabel.classList.remove('show'), 900);
  }

  function checkSfxTriggers(frame) {
    for (const [key, t] of Object.entries(SFX_TRIGGERS)) {
      if (!firedSfx.has(key) && frame >= t.frame && frame <= t.frame + t.range) {
        firedSfx.add(key);
        playSound(t.file, 0.9);
        flashLabel(t.label);
        // Spawn particles at the SFX screen position
        spawnParticles(
          pCanvas.width  * t.cx,
          pCanvas.height * t.cy,
          t.color,
          key === 'explosion' ? 70 : 45
        );
      }
      if (frame < t.frame - t.range) firedSfx.delete(key);
    }
  }

  const soundBtn = document.getElementById('sound-btn');
  soundBtn.addEventListener('click', () => {
    muted = !muted;
    soundBtn.textContent = muted ? '🔇' : '🔊';
    if (muted) stopWhoosh();
  });

  /* ══════════════════════════════════════
     SECTION NAV DOTS
  ══════════════════════════════════════ */
  const TOTAL = 600;
  const snavDots = Array.from(document.querySelectorAll('.snav-dot'));
  const sectionLabel = document.getElementById('section-label');

  // Sections: frame → label mapping for centre label
  const SECTIONS = [
    { frame: 0,   label: '' },
    { frame: 80,  label: 'Intro' },
    { frame: 150, label: 'Portfolio' },
    { frame: 300, label: 'About Me' },
    { frame: 440, label: 'Skills' },
    { frame: 510, label: 'Projects' },
    { frame: 560, label: 'Qualifications' },
    { frame: 590, label: 'Thank You' },
  ];

  snavDots.forEach(dot => {
    dot.addEventListener('click', () => {
      const targetF = parseInt(dot.dataset.frame);
      const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
      const targetScroll = (targetF / (TOTAL - 1)) * maxScroll;
      window.scrollTo({ top: targetScroll, behavior: 'smooth' });
    });
  });

  function updateSectionNav(frame) {
    // Highlight active dot
    snavDots.forEach(d => {
      const f = parseInt(d.dataset.frame);
      d.classList.toggle('active', Math.abs(frame - f) < 40);
    });

    // Update centre section label
    let active = SECTIONS[0];
    for (const s of SECTIONS) {
      if (frame >= s.frame) active = s;
    }
    if (active.label) {
      sectionLabel.textContent = active.label;
      sectionLabel.classList.add('visible');
    } else {
      sectionLabel.classList.remove('visible');
    }
  }

  /* ══════════════════════════════════════
     FRAME ANIMATION ENGINE
  ══════════════════════════════════════ */
  const canvas = document.getElementById('anim-canvas');
  const ctx    = canvas.getContext('2d');
  const loader = document.getElementById('loader');
  const fill   = document.getElementById('loader-fill');
  const count  = document.getElementById('loader-count');
  const pctEl  = document.getElementById('loader-pct');
  const hint   = document.getElementById('scroll-hint');
  const prog   = document.getElementById('progress');

  const framePaths = Array.from({ length: TOTAL }, (_, i) =>
    `frames/frame_${String(i).padStart(4, '0')}.jpg`
  );
  const images = new Array(TOTAL);
  let loaded = 0, currentFrame = 0, raf = null;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    resizeOverlay();
    resizeParticle();
    drawFrame(currentFrame);
  }

  function drawFrame(idx) {
    const img = images[idx];
    if (!img) return;
    const cw = canvas.width, ch = canvas.height;
    const iw = img.naturalWidth  || 1920;
    const ih = img.naturalHeight || 1080;
    const scale = Math.max(cw / iw, ch / ih);
    const dw = iw * scale, dh = ih * scale;
    ctx.clearRect(0, 0, cw, ch);
    ctx.drawImage(img, (cw - dw) / 2, (ch - dh) / 2, dw, dh);
  }

  function preload() {
    framePaths.forEach((src, i) => {
      const img = new Image();
      img.onload = () => {
        images[i] = img; loaded++;
        const pct = Math.round((loaded / TOTAL) * 100);
        fill.style.width  = pct + '%';
        count.textContent = `${loaded} / ${TOTAL}`;
        pctEl.textContent = pct + '%';
        if (loaded === TOTAL) onReady();
      };
      img.onerror = () => { loaded++; if (loaded === TOTAL) onReady(); };
      img.src = src;
    });
  }

  function onReady() {
    resize();
    setTimeout(() => {
      loader.classList.add('hidden');
      setTimeout(() => loader.remove(), 700);
      document.getElementById('navbar').classList.add('visible');
      document.getElementById('sound-btn').classList.add('visible');
      document.getElementById('section-nav').classList.add('visible');
    }, 400);
  }

  let targetFrame = 0, displayFrame = 0;

  function onScroll() {
    const scrollTop = window.scrollY || document.documentElement.scrollTop;
    const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
    const progress  = Math.min(Math.max(scrollTop / maxScroll, 0), 1);

    targetFrame = Math.floor(progress * (TOTAL - 1));
    prog.style.width = (progress * 100) + '%';

    if (scrollTop > 80) hint.classList.add('gone');

    onScrollSound();
    scheduleRaf();
  }

  function scheduleRaf() {
    if (!raf) raf = requestAnimationFrame(tick);
  }

  function tick() {
    raf = null;
    displayFrame += (targetFrame - displayFrame) * 0.25;
    const frame = Math.round(displayFrame);

    if (frame !== currentFrame) {
      currentFrame = Math.max(0, Math.min(TOTAL - 1, frame));
      drawFrame(currentFrame);
      checkSfxTriggers(currentFrame);
      updateSectionNav(currentFrame);
    }

    if (Math.abs(targetFrame - displayFrame) > 0.5) scheduleRaf();
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', resize);

  /* ══════════════════════════════════════
     SOUND UNLOCK GATE
  ══════════════════════════════════════ */
  const unlockEl = document.getElementById('sound-unlock');

  unlockEl.addEventListener('click', async () => {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    unlockEl.classList.add('hidden');
    setTimeout(() => unlockEl.remove(), 600);

    await Promise.all([
      loadSound('scroll',    'sounds/scroll.mp3'),
      loadSound('crack',     'sounds/crack.mp3'),
      loadSound('explosion', 'sounds/explosion.mp3'),
    ]);

    preload();
  });

})();
</script>
</body>
</html>
